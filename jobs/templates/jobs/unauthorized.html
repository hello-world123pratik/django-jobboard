{% extends "base.html" %}
{% block title %}Access Denied — JobBoard{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 200px);display:flex;align-items:center;justify-content:center;padding:20px 0;">
  <div style="max-width:460px;width:100%;text-align:center;background:#fff;border-radius:16px;border:1px solid var(--border);padding:48px 36px;box-shadow:var(--shadow-lg);">
    <div style="width:76px;height:76px;border-radius:50%;background:#fef2f2;border:2px solid #fecaca;color:#dc2626;display:flex;align-items:center;justify-content:center;font-size:1.9rem;margin:0 auto 22px;">
      <i class="bi bi-shield-lock-fill"></i>
    </div>
    <h1 style="font-size:1.55rem;color:var(--navy);margin-bottom:10px;">Access Denied</h1>
    <p style="color:var(--muted);font-size:0.93rem;margin-bottom:28px;line-height:1.65;">
      You don't have permission to view this page. Please log in with an appropriate account to continue.
    </p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <a href="{% url 'login' %}" class="btn btn-primary btn-lg"><i class="bi bi-box-arrow-in-right"></i> Sign In</a>
      <a href="{% url 'job_list' %}" class="btn btn-ghost btn-lg"><i class="bi bi-briefcase"></i> Browse Jobs</a>
    </div>
  </div>
</div>
{% endblock %}
